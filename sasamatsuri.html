<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎋 内子笹まつり 広告振り分け</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232e8b57'/><g stroke='%23dff5e8' stroke-width='5' stroke-linecap='round'><path d='M50 88 V40' fill='none'/></g><path d='M50 42 C40 30 30 30 24 24 C40 26 46 32 50 40 Z' fill='%23bdebc8'/><path d='M50 50 C62 40 70 42 78 38 C64 44 58 50 50 56 Z' fill='%23a6e6b8'/><circle cx='34' cy='20' r='5' fill='%23ffd23f'/><circle cx='70' cy='30' r='5' fill='%23e0245e'/><circle cx='66' cy='62' r='5' fill='%232d8fd5'/><circle cx='32' cy='58' r='5' fill='%23f5a623'/></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:#2e8b57; --green-dark:#1f6b41; --navy:#163a2a;
    --teal:#1f9e8f; --cream:#f3fff7; --line:#cfe9d8; --gray:#6f8a7c;
    --t0:#e0245e; --t1:#f5a623; --t2:#e0a800; --t3:#2e9e5b; --t4:#2d8fd5; --t5:#8a6fd1;
  }
  body{
    font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Meiryo',sans-serif;
    color:var(--navy); min-height:100vh; padding-bottom:48px;
    background:
      radial-gradient(circle at 12% 8%, rgba(255,255,255,0.22), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(255,255,255,0.18), transparent 42%),
      linear-gradient(160deg,#0f5d3a 0%, #2e9e6b 45%, #8fe0b0 100%);
  }
  .wrap{ max-width:1040px; margin:0 auto; padding:0 14px; }

  /* 七夕飾り */
  .streamers{ display:flex; justify-content:space-around; padding:8px 10px 0; max-width:1040px; margin:0 auto; }
  .streamer{ width:30px; height:50px; border-radius:6px 6px 10px 10px; opacity:.92;
    animation:sway 4s ease-in-out infinite; box-shadow:0 4px 8px rgba(0,0,0,.15); }
  .streamer:nth-child(even){ animation-delay:-2s; height:42px; }
  .streamer:nth-child(3n){ animation-delay:-1s; }
  @keyframes sway{ 0%,100%{ transform:translateY(0) rotate(-2deg);} 50%{ transform:translateY(6px) rotate(2deg);} }

  .header{ text-align:center; color:#fff; padding:8px 12px 14px; }
  .header h1{ font-size:27px; font-weight:800; letter-spacing:.04em; text-shadow:0 2px 0 var(--green-dark),0 4px 12px rgba(0,0,0,.35); }
  .header .sub{ margin-top:5px; font-size:12.5px; color:#e4ffee; letter-spacing:.1em; }

  /* 年度バー */
  .edbar{ display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; margin:2px auto 12px; color:#fff; }
  .edbar select{ font-family:inherit; font-size:14px; font-weight:800; padding:7px 12px; border-radius:10px; border:none; background:#fff; color:var(--navy); }
  .mini{ padding:7px 11px; border:none; border-radius:9px; cursor:pointer; font-family:inherit; font-weight:800; font-size:12.5px;
    background:rgba(255,255,255,.92); color:var(--green-dark); box-shadow:0 3px 7px rgba(0,0,0,.18); }
  .mini:active{ transform:translateY(1px); }

  /* 集計（枠ごと） */
  .tiers-sum{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:12px; }
  .tsum{ background:var(--cream); border-radius:12px; padding:8px 12px; text-align:center; min-width:96px;
    box-shadow:0 4px 12px rgba(0,0,0,.16); border-top:5px solid #ccc; }
  .tsum .tl{ font-size:11.5px; font-weight:800; color:var(--navy); }
  .tsum .tc{ font-size:22px; font-weight:800; line-height:1.1; }
  .tsum .tc small{ font-size:12px; }
  .tsum .tm{ font-size:11px; color:var(--gray); font-weight:700; }

  /* ツールバー */
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:6px 0 12px; }
  .btn{ padding:9px 15px; border:none; border-radius:10px; cursor:pointer; font-size:13px; font-weight:800; font-family:inherit;
    box-shadow:0 3px 8px rgba(0,0,0,.2); transition:transform .08s,filter .15s; }
  .btn:active{ transform:translateY(1px); } .btn:hover{ filter:brightness(1.05); }
  .btn-add{ background:linear-gradient(180deg,#5ad19a,#1f9e6b); color:#fff; font-size:14px; padding:10px 18px; }
  .btn-ghost{ background:rgba(255,255,255,.94); color:var(--navy); }
  .btn-cloud{ background:linear-gradient(180deg,#5ad1a8,#1f9e8f); color:#fff; }
  .btn-print{ background:linear-gradient(180deg,#fff,#e7fbef); color:var(--green-dark); }
  .search{ flex:1; min-width:150px; padding:9px 14px; border-radius:10px; border:2px solid rgba(255,255,255,.6);
    font-size:13px; font-family:inherit; background:rgba(255,255,255,.96); outline:none; }
  .spacer{ flex:1; }
  .seg{ display:flex; background:rgba(255,255,255,.35); border-radius:11px; padding:3px; gap:3px; }
  .seg button{ border:none; background:transparent; font-family:inherit; font-weight:800; font-size:13px; color:#0c3a26;
    padding:7px 14px; border-radius:9px; cursor:pointer; }
  .seg button.on{ background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.18); color:var(--green-dark); }

  /* ===== 一覧（振り分け） ===== */
  .panel{ background:rgba(255,255,255,.97); border-radius:16px; padding:10px; box-shadow:0 8px 24px rgba(0,0,0,.18);
    overflow-x:auto; -webkit-overflow-scrolling:touch; }
  table.list{ width:100%; min-width:640px; border-collapse:collapse; }
  table.list th{ font-size:11.5px; color:var(--gray); text-align:left; padding:6px 8px; border-bottom:2px solid var(--line); white-space:nowrap; }
  table.list td{ padding:7px 8px; border-bottom:1px solid #eef5f0; font-size:13.5px; vertical-align:middle; }
  table.list tr:hover td{ background:#f5fbf7; }
  .badge{ display:inline-block; color:#fff; font-weight:800; font-size:11px; padding:2px 9px; border-radius:999px; white-space:nowrap; }
  .amt{ font-weight:800; text-align:right; white-space:nowrap; }
  td .tsel{ font-family:inherit; font-size:12px; font-weight:700; padding:4px 6px; border-radius:8px; border:1.5px solid var(--line); background:#fff; }
  .ovr{ font-size:10px; color:#c0271f; font-weight:800; margin-left:4px; }
  .rowbtn{ border:none; background:#eef5f0; border-radius:8px; padding:5px 9px; cursor:pointer; font-size:12px; font-weight:800; color:var(--green-dark); }
  .rowbtn.del{ background:#fdeaea; color:#c0271f; }
  .pname{ font-weight:800; }
  .pmeta{ font-size:11px; color:var(--gray); }

  /* ===== レイアウト下見 ===== */
  .board{ background:rgba(255,255,255,.97); border-radius:16px; padding:14px; box-shadow:0 8px 24px rgba(0,0,0,.18); }
  .tierblock{ margin-bottom:14px; }
  .tierhead{ display:flex; align-items:center; gap:8px; margin:4px 0 8px; }
  .tierhead .badge{ font-size:12px; }
  .tierhead .cnt{ font-size:12px; color:var(--gray); font-weight:700; }
  .boxes{ display:flex; flex-wrap:wrap; gap:7px; align-items:stretch; }
  .adbox{ display:flex; align-items:center; justify-content:center; text-align:center; font-weight:800;
    border-radius:8px; padding:6px 9px; color:#173a29; background:#fff; border:2px solid; line-height:1.18;
    box-shadow:0 2px 5px rgba(0,0,0,.08); word-break:break-word; position:relative; cursor:pointer; }
  .adbox.paid{ background:#e7f8ee; }
  .adbox.paid::after{ content:'✓'; position:absolute; top:-7px; right:-7px; width:18px; height:18px; border-radius:50%;
    background:#1f9e6b; color:#fff; font-size:12px; line-height:18px; font-weight:800; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  /* 入金トグル（一覧） */
  .paybtn{ border:none; border-radius:999px; padding:5px 12px; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:12px; background:#eef0ee; color:#8a8f8a; white-space:nowrap; }
  .paybtn.on{ background:linear-gradient(180deg,#5ad19a,#1f9e6b); color:#fff; }
  .empty{ text-align:center; color:var(--gray); padding:30px 10px; font-weight:700; }
  /* 1枚印刷用に詰める（計測時も適用してズーム率を最適化） */
  .board.fit1 .boxes{ gap:4px; }
  .board.fit1 .adbox{ min-height:0 !important; padding:3px 7px !important; box-shadow:none; border-width:1.5px; }
  .board.fit1 .tierblock{ margin-bottom:8px; }
  .board.fit1 .tierhead{ margin:2px 0 5px; }

  /* モーダル */
  .ov{ position:fixed; inset:0; background:rgba(10,40,26,.5); display:none; align-items:center; justify-content:center; z-index:400; padding:16px; }
  .ov.show{ display:flex; }
  .modal{ background:#fff; border-radius:18px; padding:20px; width:100%; max-width:430px; box-shadow:0 20px 50px rgba(0,0,0,.3); max-height:90vh; overflow:auto; }
  .modal h2{ font-size:18px; color:var(--green-dark); margin-bottom:14px; }
  .fld{ margin-bottom:12px; } .fld label{ display:block; font-size:12px; font-weight:800; color:var(--gray); margin-bottom:4px; }
  .fld input,.fld select,.fld textarea{ width:100%; padding:9px 11px; border:2px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; outline:none; }
  .fld input:focus,.fld select:focus,.fld textarea:focus{ border-color:var(--teal); }
  .fld textarea{ min-height:54px; resize:vertical; }
  .modal-btns{ display:flex; gap:8px; margin-top:6px; }
  .modal-btns .btn{ flex:1; justify-content:center; }
  .btn-save{ background:linear-gradient(180deg,#5ad19a,#1f9e6b); color:#fff; }
  .btn-cancel{ background:#eef0ee; color:#555; }

  /* 枠設定 */
  .trow{ display:grid; grid-template-columns:18px 1fr 110px 34px; gap:8px; align-items:center; margin-bottom:8px; }
  .trow .sw{ width:16px; height:16px; border-radius:5px; }
  .trow input{ padding:7px 9px; border:2px solid var(--line); border-radius:9px; font-size:13px; font-family:inherit; }
  .trow .del{ border:none; background:#fdeaea; color:#c0271f; border-radius:8px; cursor:pointer; font-weight:800; }
  .hint{ font-size:11.5px; color:var(--gray); margin:2px 0 12px; line-height:1.5; }

  #toast{ position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:rgba(16,58,40,.95); color:#fff; padding:12px 22px; border-radius:999px; font-size:14px; font-weight:700;
    box-shadow:0 6px 20px rgba(0,0,0,.3); opacity:0; pointer-events:none; transition:opacity .25s,transform .25s; z-index:600; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .foot{ text-align:center; color:rgba(255,255,255,.75); font-size:11px; margin-top:18px; }

  @media print{
    body{ background:#fff; padding:0; }
    .streamers,.toolbar,.edbar,.foot,.seg,#toast,.rowbtn,.btn{ display:none !important; }
    .panel,.board{ box-shadow:none; }
    .header h1{ color:#000; text-shadow:none; }
    .header .sub{ color:#444; }
    .tierblock, .adbox{ break-inside:avoid; page-break-inside:avoid; }
  }
  /* レイアウト下見だけを1枚に印刷するモード */
  @media print{
    body.printing-board .streamers,
    body.printing-board .header,
    body.printing-board .tiers-sum,
    body.printing-board .foot{ display:none !important; }
    body.printing-board .wrap{ padding:0; margin:0; max-width:none; }
    body.printing-board .board{ padding:4px; }
    body.printing-board .tierhead{ margin:2px 0 4px; }
  }
  @media(max-width:560px){
    .header h1{ font-size:22px; }
    table.list .hide-sp{ display:none; }
    .tsum{ min-width:80px; padding:7px 9px; }
  }

  /* ===== 業者用 掲載リスト（清書） ===== */
  #vendor-doc{ background:#fff; color:#1a1a1a; font-family:'Hiragino Mincho ProN','Yu Mincho',serif; padding:6px 2px; }
  #vendor-doc .vd-title{ text-align:center; font-size:19px; font-weight:800; letter-spacing:.08em; margin-bottom:2px; }
  #vendor-doc .vd-sub{ text-align:center; font-size:11px; color:#555; margin-bottom:12px; }
  #vendor-doc table.vd-sum{ width:100%; border-collapse:collapse; margin-bottom:14px; }
  #vendor-doc table.vd-sum th, #vendor-doc table.vd-sum td{ border:1px solid #333; padding:4px 8px; font-size:12px; text-align:center; }
  #vendor-doc table.vd-sum th{ background:#f2f2ec; }
  #vendor-doc .vtier{ margin-bottom:13px; }
  #vendor-doc .vtier-h{ font-size:13.5px; font-weight:800; border-left:6px solid #999; padding:2px 8px; margin-bottom:5px; }
  #vendor-doc .vtier-h small{ font-weight:600; color:#666; margin-left:8px; }
  #vendor-doc .vnames{ display:flex; flex-wrap:wrap; gap:3px 14px; font-size:12.5px; line-height:1.7; }
  #vendor-doc .vnames .vn{ white-space:nowrap; }
  #vendor-doc .vnames .num{ color:#999; font-size:10px; margin-right:2px; }
  #vendor-doc .vnames .vmemo{ color:#a15c00; font-size:10px; }
  #vendor-doc .vnames .vunpaid{ color:#b00; font-size:10px; }
  #vendor-doc .vd-notes{ margin-top:14px; padding-top:8px; border-top:1px solid #999; font-size:11px; color:#444; line-height:1.7; }
  @media print{
    body.printing-vendor > :not(#ov-vendor){ display:none !important; }
    body.printing-vendor #ov-vendor{ display:block !important; position:static; padding:0; background:#fff; }
    body.printing-vendor #ov-vendor .modal{ max-width:none; width:auto; box-shadow:none; border-radius:0; max-height:none; overflow:visible; padding:0; }
    body.printing-vendor .vendor-noprint{ display:none !important; }
    #vendor-doc .vtier{ break-inside:avoid; page-break-inside:avoid; }
  }
</style>
</head>
<body>

<div class="streamers">
  <div class="streamer" style="background:linear-gradient(#e0245e,#ff8fae)"></div>
  <div class="streamer" style="background:linear-gradient(#f5a623,#ffd28a)"></div>
  <div class="streamer" style="background:linear-gradient(#2d8fd5,#9fd0f5)"></div>
  <div class="streamer" style="background:linear-gradient(#8a6fd1,#c9b8f0)"></div>
  <div class="streamer" style="background:linear-gradient(#2e9e5b,#9be3b8)"></div>
  <div class="streamer" style="background:linear-gradient(#e0a800,#ffe680)"></div>
  <div class="streamer" style="background:linear-gradient(#e0245e,#ff8fae)"></div>
  <div class="streamer" style="background:linear-gradient(#2d8fd5,#9fd0f5)"></div>
</div>

<div class="header">
  <h1 id="app-title">🎋 内子笹まつり 広告振り分け</h1>
  <div class="sub">寄付額にあわせて掲載枠（名前の大きさ）を自動で振り分け・下見できます</div>
</div>

<div class="wrap">
  <div class="edbar">
    <span style="font-weight:800;">回：</span>
    <select id="ed-select" onchange="switchEdition(this.value)"></select>
    <button class="mini" onclick="newEdition()">＋ 新しい年</button>
    <button class="mini" onclick="renameEdition()">名前変更</button>
    <button class="mini ed-del" onclick="deleteEdition()">削除</button>
  </div>

  <div class="tiers-sum" id="tiers-sum"></div>

  <div class="toolbar">
    <input class="search" id="search" placeholder="🔍 会社名・担当者で検索" oninput="render()">
    <div class="seg">
      <button id="seg-list" class="on" onclick="setView('list')">一覧で振り分け</button>
      <button id="seg-board" onclick="setView('board')">レイアウト下見</button>
    </div>
    <button class="btn btn-add" onclick="openEdit(null)">＋ 寄付者を追加</button>
    <span class="spacer"></span>
    <button class="btn btn-ghost" onclick="openTiers()">⚙ 枠の設定</button>
    <button class="btn btn-ghost" onclick="importJSON()">📥 集金データ読込</button>
    <button class="btn btn-print" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn btn-print" onclick="exportBackup()">💾 控え(JSON)</button>
    <button class="btn btn-print" onclick="window.print()">🖨 印刷</button>
    <button class="btn btn-print" onclick="printBoardOnePage()">🖨 下見を1枚に</button>
    <button class="btn btn-print" onclick="openVendor()">📄 業者用リスト</button>
    <button class="btn btn-cloud" onclick="syncUpload()">☁↑ 保存</button>
    <button class="btn btn-cloud" onclick="syncDownload()">☁↓ 読込</button>
  </div>

  <div id="view"></div>

  <div class="foot">データはこの端末に自動保存され、クラウドにも自動同期されます。印刷物用は「CSV」か「印刷」から。</div>
</div>

<!-- 編集モーダル -->
<div class="ov" id="ov-edit">
  <div class="modal">
    <h2 id="edit-title">寄付者を追加</h2>
    <div class="fld"><label>会社・団体・個人名</label><input id="f-name" placeholder="例：株式会社 森本"></div>
    <div class="fld"><label>寄付額（円）</label><input id="f-amount" type="number" inputmode="numeric" placeholder="例：30000"></div>
    <div class="fld"><label>担当者（集金担当・任意）</label><input id="f-person" placeholder="例：大森"></div>
    <div class="fld"><label>掲載枠</label>
      <select id="f-tier"></select>
      <div class="hint" style="margin:6px 0 0;">「自動」だと寄付額から枠が決まります。特別に大きく/小さく載せたい時だけ枠を指定してください。</div>
    </div>
    <div class="fld"><label>メモ（任意）</label><textarea id="f-note" placeholder="ロゴあり／例年どおり 等"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="btn btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 枠設定モーダル -->
<div class="ov" id="ov-tiers">
  <div class="modal">
    <h2>掲載枠の設定</h2>
    <div class="hint">上にあるほど大きい枠です。「○円以上」でその枠に自動で振り分けられます。金額が多い枠を上に並べてください。</div>
    <div id="tiers-edit"></div>
    <button class="mini" style="margin:4px 0 14px;" onclick="addTierRow()">＋ 枠を追加</button>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeTiers()">キャンセル</button>
      <button class="btn btn-save" onclick="saveTiers()">保存</button>
    </div>
  </div>
</div>

<!-- 業者打ち合わせ用 掲載リスト -->
<div class="ov" id="ov-vendor">
  <div class="modal" style="max-width:780px;">
    <div class="vendor-noprint" style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
      <h2 style="margin:0;flex:1;font-size:16px;">📄 業者打ち合わせ用 掲載リスト</h2>
      <label style="font-size:12px;font-weight:800;color:var(--gray);display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="checkbox" id="vendor-paidonly" onchange="renderVendor()"> 未入金を除く
      </label>
      <button class="btn btn-save" onclick="printVendor()">🖨 印刷 / PDF</button>
      <button class="btn btn-cancel" onclick="closeVendor()">閉じる</button>
    </div>
    <div id="vendor-doc"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ====== 自動更新チェック（キャッシュ対策）======
  (async function autoUpdateCheck(){
    try{
      const res = await fetch(window.location.pathname + '?_cb=' + Date.now(), { cache:'no-store' });
      if(!res.ok) return;
      const html = await res.text();
      const hash = html.length + ':' + html.slice(0, 200);
      const stored = localStorage.getItem('sasa_app_version_hash');
      if(stored && stored !== hash){
        localStorage.setItem('sasa_app_version_hash', hash);
        window.location.reload();
        return;
      }
      if(!stored) localStorage.setItem('sasa_app_version_hash', hash);
    }catch(e){ /* file://等では無視 */ }
  })();

  // ====== 保存キー ======
  const KEY  = 'uchiko_sasa_ads';
  const EKEY = 'uchiko_sasa_ads_editions';
  const TKEY = 'uchiko_sasa_ads_tiers';
  const VKEY = 'uchiko_sasa_ads_ver';
  // 初期データ・枠を更新した日付。ここを変えると次に開いた時だけ最新へ入れ替わる。
  const SEED_VER = '2026-06-24-sasa174-5tiers';
  let justMigrated = false;
  const SYNC_URL = 'https://script.google.com/macros/s/AKfycbxwL19mAenATUMILRsQYrDL0ThjU2C583Cj729OfzNHEH3drMcZCExYULRp4VGOZ11J/exec';
  const SYNC_KEY = 'uchiko_sasamatsuri_ads';

  // ====== 既定の掲載枠（金額が多い順／編集可能。笹まつりポスターの5段階） ======
  const DEFAULT_TIERS = [
    { id:'s', label:'特大（最上段ロゴ枠）', min:50000, color:'#e0245e' },
    { id:'a', label:'大枠',               min:20000, color:'#f5a623' },
    { id:'b', label:'中枠（マス）',        min:10000, color:'#e0a800' },
    { id:'c', label:'小枠',               min:5000,  color:'#2e9e5b' },
    { id:'d', label:'名前のみ（最下段）',  min:3000,  color:'#2d8fd5' },
  ];
  // 枠の大きさ（上＝大きい）。順位で見た目サイズを決める。
  const SIZE_BY_RANK = [

  function sortedTiers(){ return [...tiers].sort((a,b)=>b.min-a.min); }
  function tierById(id){ return tiers.find(t=>t.id===id); }
  function rankOf(id){ const s=sortedTiers(); return s.findIndex(t=>t.id===id); }
  function autoTierId(amount){
    const s = sortedTiers();
    for(const t of s){ if((Number(amount)||0) >= t.min) return t.id; }
    return s.length ? s[s.length-1].id : null;
  }

  function loadTiers(){

    tiers = JSON.parse(JSON.stringify(DEFAULT_TIERS));

  function load(){
    // 初期データのバージョンが変わったら一度だけ最新に入れ替え
    if(localStorage.getItem(VKEY) !== SEED_VER){
      localStorage.removeItem(KEY); localStorage.removeItem(EKEY); localStorage.removeItem(TKEY);
      localStorage.setItem(VKEY, SEED_VER);
      justMigrated = true;
    }
    loadTiers();

    if(estore && Array.isArray(estore.list) && estore.list.length){
      editions=estore.list; curId=estore.curId; dataSavedAt=Number(estore.savedAt)||0;
      if(!editions.some(e=>e.id===curId)) curId=editions[0].id;

      let seed=null; try{ seed=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
      const base = (Array.isArray(seed)&&seed.length) ? seed

    editions.forEach(e=>{ if(e.label==='2025年（第66回）') e.label='2026年（第67回）'; });
    sponsors.forEach(s=>{ if(s.tierOverride===undefined) s.tierOverride=''; if(s.note===undefined) s.note=''; if(s.paid===undefined) s.paid=false; });

  let dataSavedAt = 0;   // 最後にユーザーが編集した時刻（クラウドとの新旧比較用）

    const ed=curEdition(); if(ed) ed.sponsors=sponsors;

  // 全ての回をまるごと保存する（開いている回だけだと、別の回を開いた端末との同期でデータが混ざるため）
  function cloudPayload(){ const ed=curEdition(); if(ed) ed.sponsors=sponsors; return { editions, curId, tiers, savedAt:dataSavedAt }; }
  function parseCloud(d){
    if(d==null) return null;
    if(typeof d==='string'){ try{ d=JSON.parse(d); }catch(e){ return null; } }
    if(Array.isArray(d)) return { sponsors:d, label:null, tiers:null };
    if(Array.isArray(d.editions)&&d.editions.length) return { editions:d.editions, curId:d.curId||null, tiers:Array.isArray(d.tiers)?d.tiers:null, savedAt:Number(d.savedAt)||0 };
    if(d.sponsors&&Array.isArray(d.sponsors)) return { sponsors:d.sponsors, label:d.label||null, tiers:Array.isArray(d.tiers)?d.tiers:null };
    return null;
  }
  function normSponsors(a){ return a.map(s=>({ name:s.name||'', person:s.person||'', amount:Number(s.amount)||0, note:s.note||'', tierOverride:s.tierOverride||'', paid:!!s.paid })); }
  function applyCloud(p){
    if(!p) return false;
    if(Array.isArray(p.editions)&&p.editions.length){
      // 新形式: 全回まるごと
      editions=p.editions.map(e=>({ id:e.id||genId(), label:e.label||'', sponsors:normSponsors(e.sponsors||[]) }));
      curId=(p.curId&&editions.some(e=>e.id===p.curId)) ? p.curId : editions[0].id;
      sponsors=curEdition().sponsors;
      if(p.tiers&&p.tiers.length){ tiers=p.tiers; localStorage.setItem(TKEY, JSON.stringify(tiers)); }
      dataSavedAt=p.savedAt||dataSavedAt;
      localStorage.setItem(KEY, JSON.stringify(sponsors)); saveEditions(); return true;
    }
    if(!Array.isArray(p.sponsors)) return false;
    // 旧形式: ラベルが一致する回に適用（見つからなければ開いている回）
    const list=normSponsors(p.sponsors);
    const tgt=(p.label&&editions.find(e=>e.label===p.label))||curEdition();
    if(!tgt) return false;
    tgt.sponsors=list;
    if(tgt.id===curId) sponsors=list;
    if(p.tiers&&p.tiers.length){ tiers=p.tiers; localStorage.setItem(TKEY, JSON.stringify(tiers)); }
    localStorage.setItem(KEY, JSON.stringify(sponsors)); saveEditions(); return true;
  }
  // 送ろうとしている内容に、実際の入力（金額・担当・メモ・入金チェック）が1件でもあるか
  function payloadHasRealData(){
    return editions.some(e=>(e.sponsors||[]).some(s=>(Number(s.amount)||0)||s.person||s.note||s.paid));
  }
  // クラウド側（読み込んだ内容）に実データがあるか
  function cloudHasRealData(p){
    if(!p) return false;
    const eds=Array.isArray(p.editions)?p.editions:(Array.isArray(p.sponsors)?[{sponsors:p.sponsors}]:[]);
    return eds.some(e=>(e.sponsors||[]).some(s=>(Number(s.amount)||0)||s.person||s.note||s.paid));
  }
  async function cloudLoadRaw(){
    const res=await fetch(SYNC_URL+'?action=load&key='+SYNC_KEY);
    const j=await res.json(); return parseCloud(j&&j.data!==undefined?j.data:j);
  }
  // すべてのクラウド保存はここを通す（安全装置つき）
  async function doCloudSave(silent){
    const iHaveData=payloadHasRealData();
    let cur=null; try{ cur=await cloudLoadRaw(); }catch(e){}
    // 【安全装置1】自分は空同然・クラウドには入力済みデータ → 破壊的上書きなので中止
    if(cloudHasRealData(cur) && !iHaveData){
      if(!silent) toast('⚠ クラウドの入力済みデータを守るため、空データでの上書きを中止しました');
      return false;
    }
    // 【安全装置2】上書きの直前に、今のクラウド内容を退避キーへ自動バックアップ
    if(cloudHasRealData(cur)){
      try{ await fetch(SYNC_URL+'?action=save&key='+SYNC_KEY+'_bak',{method:'POST',body:JSON.stringify(cur)}); }catch(e){}
    }
    try{
      const res=await fetch(SYNC_URL+'?action=save&key='+SYNC_KEY,{method:'POST',body:JSON.stringify(cloudPayload())});
      const j=await res.json();
      if(j&&j.success){ if(!silent) toast('☁ クラウドに保存しました'); return true; }
      if(!silent) toast('保存に失敗しました'); return false;
    }catch(e){ if(!silent) toast('通信エラー（端末内には保存済み）'); return false; }
  }
  async function pushCloudSilent(){ return doCloudSave(true); }
  async function syncUpload(){ toast('☁ 保存中…'); return doCloudSave(false); }
  async function syncDownload(){
    if(!confirm('クラウドの内容を読み込み、今の表示を上書きします。よろしいですか？')) return;
    toast('☁ 読込中…');
    try{ const res=await fetch(SYNC_URL+'?action=load&key='+SYNC_KEY);
      const j=await res.json(); const p=parseCloud(j&&j.data!==undefined?j.data:j);
      if(applyCloud(p)){ render(); toast('☁ 読み込みました'); } else toast('クラウドにデータがありません'); }
    catch(e){ toast('通信エラー'); }
  }
  async function autoRestore(){
    try{ const res=await fetch(SYNC_URL+'?action=load&key='+SYNC_KEY);
      const j=await res.json(); const p=parseCloud(j&&j.data!==undefined?j.data:j);
      if(!p) return;
      // 手元の方が新しい場合はクラウドで上書きせず、逆に手元をクラウドへ送る
      if(p.savedAt && dataSavedAt > p.savedAt){ pushCloudSilent(); return; }
      const has=(Array.isArray(p.editions)&&p.editions.length)||(Array.isArray(p.sponsors)&&p.sponsors.length);
      if(has){ applyCloud(p); render(); } }catch(e){}
  }

      const cur = sp.tierOverride||'';
      let o=`<option value="">自動</option>`;
      sortedTiers().forEach(t=>{ o+=`<option value="${t.id}" ${cur===t.id?'selected':''}>${esc(t.label)}</option>`; });
      return o;
    };
    let html=`<div class="panel"><table class="list"><thead><tr>
      <th>会社・団体名</th><th class="hide-sp">担当</th><th style="text-align:right">寄付額</th>
      <th>入金</th><th>掲載枠</th><th>枠の指定</th><th></th></tr></thead><tbody>`;
    if(!rows.length){ html+=`<tr><td colspan="7"><div class="empty">該当なし。「＋ 寄付者を追加」から登録できます。</div></td></tr>`; }
    rows.forEach(({s,i})=>{
      const eid=effTierId(s);
      html+=`<tr>
        <td><span class="pname">${esc(s.name)||'(名称未設定)'}</span>${s.note?`<div class="pmeta">📝 ${esc(s.note)}</div>`:''}</td>
        <td class="hide-sp pmeta">${esc(s.person)||'—'}</td>
        <td class="amt">${yen(s.amount)}</td>
        <td><button class="paybtn ${s.paid?'on':''}" onclick="togglePaid(${i})">${s.paid?'✓ 済':'未'}</button></td>
        <td>${tierBadge(eid)}${s.tierOverride?'<span class="ovr">指定</span>':''}</td>
        <td><select class="tsel" onchange="setOverride(${i}, this.value)">${tierOpts(s)}</select></td>
        <td style="white-space:nowrap">
          <button class="rowbtn" onclick="openEdit(${i})">編集</button>
          <button class="rowbtn del" onclick="delItem(${i})">削除</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
    $('view').innerHTML=html;
  }

  function renderBoard(){
    const q=$('search').value.trim().toLowerCase();
    let html=`<div class="board">`;
    const s=sortedTiers();
    let any=false;
    s.forEach((t,rank)=>{
      let list=sponsors.filter(sp=>effTierId(sp)===t.id);
      if(q) list=list.filter(sp=>(sp.name||'').toLowerCase().includes(q)||(sp.person||'').toLowerCase().includes(q));
      if(!list.length) return;
      any=true;
      list.sort((a,b)=>(Number(b.amount)||0)-(Number(a.amount)||0));
      const sz=sizeForRank(rank);
      html+=`<div class="tierblock">
        <div class="tierhead">${tierBadge(t.id)}<span class="cnt">${list.length}件 ・ ${esc(t.label)}（${t.min.toLocaleString()}円〜）</span></div>
        <div class="boxes">`;
      list.forEach(sp=>{
        const gi=sponsors.indexOf(sp);
        html+=`<div class="adbox ${sp.paid?'paid':''}" onclick="togglePaid(${gi})"
          title="${esc(sp.name)}　${yen(sp.amount)}　${sp.paid?'✓入金済（タップで未入金に戻す）':'未入金（タップで入金済にする）'}"
          style="min-width:${sz.w}px;min-height:${sz.h}px;font-size:${sz.fs}px;border-color:${t.color}">${esc(sp.name)||'(名称未設定)'}</div>`;
      });
      html+=`</div></div>`;
    });
    if(!any) html+=`<div class="empty">表示できる寄付者がいません。</div>`;
    html+=`</div>`;
    $('view').innerHTML=html;
  }

  // ====== 操作 ======
  function setOverride(i, val){ sponsors[i].tierOverride=val; save(); render(); }
  function togglePaid(i){
    const s=sponsors[i]; if(!s) return;
    s.paid=!s.paid; save(); render();
    toast(s.paid ? `✓ ${s.name}：入金済にしました` : `${s.name}：未入金に戻しました`);
  }
  function delItem(i){ if(confirm(`「${sponsors[i].name}」を削除しますか？`)){ sponsors.splice(i,1); save(); render(); toast('削除しました'); } }

  let editIdx=null;
  function buildTierSelect(sel, cur){
    let o=`<option value="">自動（寄付額で決定）</option>`;
    sortedTiers().forEach(t=>{ o+=`<option value="${t.id}" ${cur===t.id?'selected':''}>${esc(t.label)}</option>`; });
    sel.innerHTML=o;
  }
  function openEdit(i){
    editIdx=i;
    const s = i==null ? {name:'',amount:'',person:'',note:'',tierOverride:''} : sponsors[i];
    $('edit-title').textContent = i==null ? '寄付者を追加' : '寄付者を編集';
    $('f-name').value=s.name||''; $('f-amount').value=s.amount===''?'':(s.amount||'');
    $('f-person').value=s.person||''; $('f-note').value=s.note||'';
    buildTierSelect($('f-tier'), s.tierOverride||'');
    $('ov-edit').classList.add('show'); setTimeout(()=>$('f-name').focus(),50);
  }
  function closeEdit(){ $('ov-edit').classList.remove('show'); editIdx=null; }
  function saveEdit(){
    const obj={ name:$('f-name').value.trim(), amount:Number($('f-amount').value)||0,
      person:$('f-person').value.trim(), note:$('f-note').value.trim(), tierOverride:$('f-tier').value,
      paid: editIdx==null ? false : !!sponsors[editIdx].paid };
    if(!obj.name){ alert('会社・団体名を入力してください'); return; }
    if(editIdx==null) sponsors.push(obj); else sponsors[editIdx]=obj;
    save(); closeEdit(); render(); toast('保存しました');
  }

  // ====== 枠設定 ======
  let tierDraft=[];
  function openTiers(){ tierDraft=JSON.parse(JSON.stringify(tiers)); renderTierEdit(); $('ov-tiers').classList.add('show'); }
  function closeTiers(){ $('ov-tiers').classList.remove('show'); }
  function renderTierEdit(){
    tierDraft.sort((a,b)=>b.min-a.min);
    $('tiers-edit').innerHTML = tierDraft.map((t,i)=>`
      <div class="trow">
        <span class="sw" style="background:${t.color}"></span>
        <input value="${esc(t.label)}" oninput="tierDraft[${i}].label=this.value" placeholder="枠の名前">
        <input type="number" value="${t.min}" oninput="tierDraft[${i}].min=Number(this.value)||0" placeholder="○円以上">
        <button class="del" onclick="tierDraft.splice(${i},1);renderTierEdit()">×</button>
      </div>`).join('');
  }
  function addTierRow(){
    const colors=['#e0245e','#f5a623','#e0a800','#2e9e5b','#2d8fd5','#8a6fd1','#16a085','#d35400'];
    tierDraft.push({ id:genId(), label:'新しい枠', min:0, color:colors[tierDraft.length%colors.length] });
    renderTierEdit();
  }
  function saveTiers(){
    if(!tierDraft.length){ alert('枠は1つ以上必要です'); return; }
    tiers=tierDraft.map(t=>({ id:t.id, label:t.label.trim()||'枠', min:Number(t.min)||0, color:t.color }));
    // 無効になった指定をクリア
    sponsors.forEach(s=>{ if(s.tierOverride && !tierById(s.tierOverride)) s.tierOverride=''; });
    save(); closeTiers(); render(); toast('枠を更新しました');
  }

  // ====== 取り込み・書き出し ======
  // 全回まるごとのバックアップを書き出し（「集金データ読込」からそのまま読み戻せます）
  function exportBackup(){
    const ed=curEdition(); if(ed) ed.sponsors=sponsors;
    const json=JSON.stringify({ editions, curId, tiers, savedAt:dataSavedAt }, null, 2);
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`笹まつり広告_控え_${new Date().toISOString().slice(0,10)}.json`; a.click();
    toast('控え(JSON)を書き出しました');
  }
  function importJSON(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
    inp.onchange=e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=ev=>{
        try{
          let d=JSON.parse(ev.target.result);
          // 「控え(JSON)」（全回まるごと）の読み戻し
          if(d&&Array.isArray(d.editions)&&d.editions.length){
            if(!confirm(`控えデータ（${d.editions.length}回分）を読み込みます。今の全ての回を置き換えます。よろしいですか？`)) return;
            applyCloud(parseCloud(d));
            save(); render(); toast('控えを読み戻しました');
            return;
          }
          let arr = Array.isArray(d) ? d : (d.sponsors||d.data||d.value);
          if(!Array.isArray(arr)) throw 0;
          if(!confirm(`${arr.length}件を読み込みます。今の一覧に置き換えます。よろしいですか？\n（集金アプリの「書き出し」JSONをそのまま読み込めます）`)) return;
          sponsors = arr.map(s=>({ name:s.name||'', person:s.person||'', amount:Number(s.amount)||0, note:s.note||'', tierOverride:s.tierOverride||'' }));
          save(); render(); toast(`${sponsors.length}件 読み込みました`);
        }catch(err){ alert('読み込めませんでした。JSONファイルを確認してください。'); }
      };
      r.readAsText(f);
    };
    inp.click();
  }
  // レイアウト下見を縦1ページに収めて印刷
  function printBoardOnePage(){
    if(view!=='board') setView('board');
    setTimeout(()=>{
      const board=document.querySelector('.board');
      if(!board){ toast('下見がありません'); return; }
      document.body.classList.add('printing-board');
      board.classList.add('fit1');
      // A4縦の印刷可能範囲のおよそのpx（余白込み）
      const PW=720, PH=1040;
      board.style.zoom='1';
      board.style.width=PW+'px';
      const h=board.scrollHeight;
      let z=Math.min(PH/h, 1); z=Math.max(z, 0.15);
      board.style.zoom=String(z);
      setTimeout(()=>window.print(), 120);
    }, view!=='board' ? 150 : 0);
  }
  window.addEventListener('afterprint', ()=>{
    const board=document.querySelector('.board');
    if(board){ board.style.zoom=''; board.style.width=''; board.classList.remove('fit1'); }
    document.body.classList.remove('printing-board');
  });

  // ===== 業者打ち合わせ用 掲載リスト =====
  function openVendor(){ renderVendor(); $('ov-vendor').classList.add('show'); }
  function closeVendor(){ $('ov-vendor').classList.remove('show'); }
  function renderVendor(){
    const paidOnly = $('vendor-paidonly').checked;
    const ed = curEdition();
    const today = new Date();
    const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
    const s = sortedTiers();
    const perTier = s.map(t=>{
      let list = sponsors.filter(sp=>effTierId(sp)===t.id);
      if(paidOnly) list = list.filter(sp=>sp.paid);
      list.sort((a,b)=>(Number(b.amount)||0)-(Number(a.amount)||0));
      return { t, list };
    });
    const total = perTier.reduce((a,x)=>a+x.list.length,0);
    let html = `
      <div class="vd-title">${esc(ed?ed.label:'')}　内子笹まつり　ポスター広告 掲載リスト</div>
      <div class="vd-sub">作成日: ${dateStr}${paidOnly?'　※入金確認済みのみ':''}　／　合計 ${total}件</div>
      <table class="vd-sum">
        <tr>${perTier.map(x=>`<th>${esc(x.t.label)}</th>`).join('')}<th>合計</th></tr>
        <tr>${perTier.map(x=>`<td>${x.list.length}件</td>`).join('')}<td><strong>${total}件</strong></td></tr>
      </table>`;
    perTier.forEach(({t,list})=>{
      if(!list.length) return;
      html += `<div class="vtier">
        <div class="vtier-h" style="border-left-color:${t.color}">${esc(t.label)}<small>${list.length}件（掲載順）</small></div>
        <div class="vnames">${list.map((sp,i)=>
          `<span class="vn"><span class="num">${i+1}.</span>${esc(sp.name)}${sp.note?` <span class="vmemo">（${esc(sp.note)}）</span>`:''}${(!paidOnly && !sp.paid)?` <span class="vunpaid">（未入金）</span>`:''}</span>`
        ).join('')}</div>
      </div>`;
    });
    html += `<div class="vd-notes">
      ※ 社名の表記（㈱・㈲・スペース・英字の大文字小文字）は本リストのとおりにお願いします。<br>
      ※ 各枠の寸法・段組は昨年のポスターに準じます。変更がある場合はご相談ください。<br>
      ※ 校正（ゲラ）は印刷前に必ず確認させてください。
    </div>`;
    $('vendor-doc').innerHTML = html;
  }
  function printVendor(){
    document.body.classList.add('printing-vendor');
    setTimeout(()=>window.print(), 60);
  }
  window.addEventListener('afterprint', ()=>{ document.body.classList.remove('printing-vendor'); });

  function exportCSV(){
    const head=['会社・団体名','寄付額','入金','掲載枠','担当','メモ'];
    const rows=[...sponsors].sort((a,b)=>(b.amount||0)-(a.amount||0)).map(s=>{
      const t=tierById(effTierId(s));
      return [s.name, s.amount, s.paid?'済':'未', t?t.label:'', s.person||'', (s.note||'').replace(/\n/g,' ')];
    });
    const csv=[head,...rows].map(r=>r.map(c=>{
      const v=String(c==null?'':c); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;
    }).join(',')).join('\r\n');
    const ed=curEdition();
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`笹まつり広告_${(ed&&ed.label)||''}.csv`; a.click();
    toast('CSVを書き出しました');
  }

  // ====== 年度（回） ======
  function switchEdition(id){ save(); curId=id; sponsors=curEdition().sponsors; sponsors.forEach(s=>{ if(s.tierOverride===undefined)s.tierOverride=''; if(s.note===undefined)s.note=''; if(s.paid===undefined)s.paid=false; }); saveEditions(); render(); }
  function newEdition(){
    save();
    const label=prompt('新しい回の名前を入力してください（例：2026年）',''); if(label===null) return;
    const name=label.trim(); if(!name){ alert('名前を入力してください'); return; }
    let list=[];
    if(sponsors.length && confirm('今の年の寄付者リストを引き継ぎますか？\n\nOK＝引き継ぐ（金額・枠の指定もそのまま。入金チェックはリセット）\nキャンセル＝空で作成')){
      list=sponsors.map(s=>({ name:s.name, person:s.person, amount:s.amount, note:s.note, tierOverride:s.tierOverride||'', paid:false }));
    }
    const ne={ id:genId(), label:name, sponsors:list };
    editions.push(ne); curId=ne.id; sponsors=ne.sponsors; save(); render(); toast(`「${name}」を作成しました`);
  }
  function renameEdition(){
    const ed=curEdition(); if(!ed) return;
    const v=prompt('回の名前を変更',ed.label); if(v===null) return;
    ed.label=v.trim()||ed.label; save(); render();
  }
  function deleteEdition(){
    if(editions.length<=1){ alert('最後の1つは削除できません'); return; }
    const ed=curEdition(); if(!confirm(`「${ed.label}」を削除しますか？`)) return;
    editions=editions.filter(e=>e.id!==curId); curId=editions[0].id; sponsors=curEdition().sponsors; save(); render(); toast('削除しました');
  }

  // モーダル背景クリックで閉じる
  $('ov-edit').addEventListener('click',e=>{ if(e.target.id==='ov-edit') closeEdit(); });
  $('ov-tiers').addEventListener('click',e=>{ if(e.target.id==='ov-tiers') closeTiers(); });
  $('ov-vendor').addEventListener('click',e=>{ if(e.target.id==='ov-vendor') closeVendor(); });

  // ====== 起動 ======
  load(); render();
  // 起動時のクラウド同期:
  // ・この端末に実編集が無い（初期データのまま）→ クラウド優先で復元。初期データは絶対に送らない
  // ・実編集がある → 新しい方を採用（手元が新しければ送る、クラウドが新しければ読む）
  (async ()=>{
    try{
      const res=await fetch(SYNC_URL+'?action=load&key='+SYNC_KEY);
      const j=await res.json(); const p=parseCloud(j&&j.data!==undefined?j.data:j);
      const has=p&&((Array.isArray(p.editions)&&p.editions.length)||(Array.isArray(p.sponsors)&&p.sponsors.length));
      const localAuthority = looksLikeUntouchedSeed() ? 0 : dataSavedAt;
      if(!has){
        // クラウドが空のときだけ、手元の内容を送る
        cloudReady=true; if(!looksLikeUntouchedSeed()) pushCloudSilent(); return;
      }
      if(localAuthority && (!p.savedAt || localAuthority > p.savedAt)){
        cloudReady=true; pushCloudSilent(); return;
      }
      if(applyCloud(p)){ render(); }
    }catch(e){}
    cloudReady=true;
  })();
</script>
</body>
</html>
